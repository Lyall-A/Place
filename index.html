    <script>
        let canvasWidth = 90;
        let offsetLeft;
        let offsetTop;
        const canvasMoveDiff = 0.25;
        let color = document.getElementById("colorselect").value || "#000000";
        let middleClick = false;
        let lastMove;
        let middleClickTimeout;
        let heartbeatInterval;
        let canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        document.getElementById("colorselect").addEventListener("change", () => {
            let value = document.getElementById("colorselect").value;
            if (!value.startsWith("#")) value = `#${value || "000000"}`;
            if (/^#[0-9A-F]{6}$/i.test(value)) {
                color = value.toUpperCase();
                document.getElementById("colorselect").value = color;
                document.getElementById("color").style.backgroundColor = color;
            } else {
                document.getElementById("colorselect").value = "#000000";
                color = "#000000";
            }
        });
        window.addEventListener("mousedown", e => {
            if (e.button === 1) {
                middleClick = true;
                offsetLeft = document.getElementById("canvas").offsetLeft - e.clientX;
                offsetTop = document.getElementById("canvas").offsetTop - e.clientY;
                document.body.style.cursor = "grab";
            }
        });
        document.body.onmousedown = e => {
            if (e.button === 1) return false;
        }
        window.addEventListener("wheel", e => {
            if (e.deltaY === -100 || e.deltaY === 100) {
                if (e.deltaY === 100) {
                    if (canvasWidth < 5) return;
                    document.getElementById("canvas").style.width = `${canvasWidth -= canvasWidth * 0.25}%`;
                } else {
                    if (canvasWidth > 10000) return;
                    document.getElementById("canvas").style.width = `${canvasWidth += canvasWidth * 0.25}%`;
                }
            }
        });
        window.addEventListener("mouseup", e => {
            if (e.button === 1) {
                middleClick = false;
                if (middleClickTimeout) clearTimeout(middleClickTimeout);
                document.body.style.cursor = "auto";
            }
        });
        window.addEventListener("mousemove", e => {
            if (middleClick) {
                document.body.style.cursor = "grabbing";
                lastMove = Date.now();
                if (middleClickTimeout) clearTimeout(middleClickTimeout);
                middleClickTimeout = setTimeout(() => { if ((Date.now() - lastMove) > 125) document.body.style.cursor = "grab" }, 500);
                document.getElementById("canvas").style.left = `${e.clientX + offsetLeft}px`;
                document.getElementById("canvas").style.top = `${e.clientY + offsetTop}px`;
            }
        });
        const ws = new WebSocket(`<wsprot>${window.location.hostname}:<wsport>`);
        fetch("/canvas").then(async res => {
            const blob = await res.blob();
            const img = new Image();

            img.onload = () => ctx.drawImage(img, 0, 0);

            img.src = URL.createObjectURL(blob);
        });
        ws.onopen = () => heartbeatInterval = setInterval(() => ws.send("heartbeat"), 10000);
        ws.onclose = () => {
            clearInterval(heartbeatInterval);
            alert("WebSocket disconnected! Please refresh");
            location.reload();
        }
        ws.onmessage = msg => {
            if (msg.data === "heartbeat") return;
            msg = JSON.parse(msg.data);
            if (msg.w && msg.h) {
                ctx.canvas.width = msg.w;
                return ctx.canvas.height = msg.h;
            }
            if (msg.code) if (msg.code === 0) return alert("You cannot place anymore pixels!");
            if (typeof msg.x !== "undefined" && typeof msg.y !== "undefined" && msg.c) {
                ctx.fillStyle = msg.c;
                ctx.fillRect(msg.x, msg.y, 1, 1);
            }
        }

        function getColor(e) {
            const { x, y } = getPos(e);
            const pixelData = ctx.getImageData(x, y, 1, 1).data;
            return `#${rgbToHex(pixelData[0], pixelData[1], pixelData[2])}`.toUpperCase();
        }

        function setColorPick(e) {
            const c = getColor(e);
            if (color === c) return;
            color = c.toUpperCase();
            document.getElementById("colorselect").value = color;
            document.getElementById("color").style.backgroundColor = color;
        }

        function setColor(e) {
            const { x, y } = getPos(e);
            const c = getColor(e);
            if (c === color.toUpperCase()) return;
            ws.send(JSON.stringify({ x, y, c: color }));
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((e.clientX - rect.left) / (rect.right - rect.left) * canvas.width);
            const y = Math.floor((e.clientY - rect.top) / (rect.bottom - rect.top) * canvas.height);
            return { x, y };
        }

        function rgbToHex(r, g, b) {
            r = r.toString(16);
            g = g.toString(16);
            b = b.toString(16);
            if (r.length === 1) r = `0${r}`;
            if (g.length === 1) g = `0${g}`;
            if (b.length === 1) b = `0${b}`;
            return r + g + b;
        }
